# Automate container workflow in Cloud Run 

steps:
    # Build production container
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "gcr.io/capstone-project-503000/github.com/travel-project-team/crowd-sourced-travel-planner:$COMMIT_SHA",
        "."
      ]

    # Push to Google container registry
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "gcr.io/capstone-project-503000/github.com/travel-project-team/crowd-sourced-travel-planner:$COMMIT_SHA"
      ]

    # Deploy Cloud Run image
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "travelplanner",
        "--image",
        "gcr.io/capstone-project-503000/github.com/travel-project-team/crowd-sourced-travel-planner:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--quiet"
      ]

# Store build logs
options:
  logging: CLOUD_LOGGING_ONLY